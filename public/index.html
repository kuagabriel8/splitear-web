<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Ear Audio Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Split Ear Audio Player</h1>
    <p>Paste two direct audio URLs (mp3, ogg, wav, m4a). Use headphones for the stereo effect.</p>

    <label for="leftUrl">Left ear audio URL:</label>
    <input id="leftUrl" type="url" placeholder="https://example.com/track-left.mp3" />

    <label for="rightUrl">Right ear audio URL:</label>
    <input id="rightUrl" type="url" placeholder="https://example.com/track-right.mp3" />

    <div class="buttons">
      <button id="loadButton">Load Tracks</button>
      <button id="playButton" disabled>Play</button>
      <button id="clearButton" type="button">Clear</button>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
